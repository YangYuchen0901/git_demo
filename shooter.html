<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射击游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            display: block;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0ff;
            font-size: 18px;
            text-shadow: 0 0 10px #0ff;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        #gameOverScreen {
            display: none;
        }
        h1 {
            font-size: 48px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #0ff, #00f);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }
        #score {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>分数: <span id="scoreValue">0</span></div>
            <div>生命: <span id="livesValue">3</span></div>
        </div>
        <div id="startScreen">
            <h1>太空射击</h1>
            <p>使用 ← → 移动，空格射击</p>
            <button onclick="startGame()">开始游戏</button>
        </div>
        <div id="gameOverScreen">
            <h1>游戏结束</h1>
            <p id="finalScore">最终分数: 0</p>
            <button onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        
        // 玩家
        const player = {
            x: 400,
            y: 550,
            width: 40,
            height: 40,
            speed: 5,
            color: '#0ff'
        };
        
        // 游戏对象数组
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        
        // 按键状态
        const keys = {
            left: false,
            right: false,
            space: false
        };
        
        // 初始化星星背景
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }
        
        // 绘制星星
        function drawStars() {
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }
        
        // 绘制玩家
        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            
            // 飞船主体
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20);
            ctx.lineTo(player.x - 20, player.y + 20);
            ctx.lineTo(player.x + 20, player.y + 20);
            ctx.closePath();
            ctx.fill();
            
            // 引擎火焰
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.moveTo(player.x - 10, player.y + 20);
            ctx.lineTo(player.x, player.y + 30 + Math.random() * 10);
            ctx.lineTo(player.x + 10, player.y + 20);
            ctx.closePath();
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }
        
        // 移动玩家
        function movePlayer() {
            if (keys.left && player.x > 30) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - 30) {
                player.x += player.speed;
            }
        }
        
        // 发射子弹
        function shoot() {
            if (keys.space && !keys.spacePressed) {
                bullets.push({
                    x: player.x,
                    y: player.y - 25,
                    width: 4,
                    height: 15,
                    speed: 8,
                    color: '#ff0'
                });
                keys.spacePressed = true;
            }
            if (!keys.space) {
                keys.spacePressed = false;
            }
        }
        
        // 绘制子弹
        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = bullet.color;
                ctx.fillRect(bullet.x - bullet.width/2, bullet.y, bullet.width, bullet.height);
            });
            ctx.shadowBlur = 0;
        }
        
        // 移动子弹
        function moveBullets() {
            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed;
                return bullet.y > -20;
            });
        }
        
        // 生成敌人
        function spawnEnemy() {
            if (Math.random() < 0.02 + level * 0.005) {
                const size = 30 + Math.random() * 20;
                enemies.push({
                    x: Math.random() * (canvas.width - 60) + 30,
                    y: -size,
                    width: size,
                    height: size,
                    speed: 2 + Math.random() * 2 + level * 0.5,
                    color: `hsl(${Math.random() * 360}, 70%, 50%)`
                });
            }
        }
        
        // 绘制敌人
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = enemy.color;
                
                // 敌人形状 - 六边形
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i - Math.PI / 2;
                    const x = enemy.x + Math.cos(angle) * enemy.width / 2;
                    const y = enemy.y + Math.sin(angle) * enemy.height / 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                // 核心
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.width / 4, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }
        
        // 移动敌人
        function moveEnemies() {
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;
                return enemy.y < canvas.height + 50;
            });
        }
        
        // 碰撞检测
        function checkCollisions() {
            // 子弹击中敌人
            bullets.forEach((bullet, bi) => {
                enemies.forEach((enemy, ei) => {
                    if (bullet.x > enemy.x - enemy.width/2 &&
                        bullet.x < enemy.x + enemy.width/2 &&
                        bullet.y < enemy.y + enemy.height/2 &&
                        bullet.y > enemy.y - enemy.height/2) {
                        
                        // 移除子弹和敌人
                        bullets.splice(bi, 1);
                        enemies.splice(ei, 1);
                        
                        // 增加分数
                        score += 10;
                        document.getElementById('scoreValue').textContent = score;
                        
                        // 创建爆炸粒子
                        createExplosion(enemy.x, enemy.y, enemy.color);
                        
                        // 升级
                        if (score % 100 === 0) {
                            level++;
                        }
                    }
                });
            });
            
            // 敌人撞到玩家
            enemies.forEach((enemy, ei) => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < enemy.width / 2 + 20) {
                    enemies.splice(ei, 1);
                    lives--;
                    document.getElementById('livesValue').textContent = lives;
                    createExplosion(player.x, player.y, '#f00');
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            });
        }
        
        // 创建爆炸效果
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 5 + 2,
                    color: color,
                    life: 1
                });
            }
        }
        
        // 绘制粒子
        function drawParticles() {
            particles = particles.filter(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                return p.life > 0;
            });
        }
        
        // 游戏主循环
        function gameLoop() {
            if (!gameRunning) return;
            
            // 清除画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            drawStars();
            
            // 更新和绘制
            movePlayer();
            drawPlayer();
            
            shoot();
            moveBullets();
            drawBullets();
            
            spawnEnemy();
            moveEnemies();
            drawEnemies();
            
            checkCollisions();
            drawParticles();
            
            requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            lives = 3;
            level = 1;
            bullets = [];
            enemies = [];
            particles = [];
            player.x = 400;
            player.y = 550;
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('livesValue').textContent = lives;
            initStars();
            gameLoop();
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = '最终分数: ' + score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        // 重新开始
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if (e.key === ' ') keys.space = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if (e.key === ' ') keys.space = false;
        });
        
        // 初始化
        initStars();
    </script>
</body>
</html>
